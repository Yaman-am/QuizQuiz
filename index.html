<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizFlow — الاختبارات</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="top-bar">
  <a href="index.html" class="top-bar-brand">
    <span class="brand-icon">Q</span>
    QuizFlow
  </a>
  <div class="top-bar-actions">
    <button class="theme-toggle" id="theme-toggle">🌙 داكن</button>
  </div>
</header>

<main class="main-content">
  <div class="container">

    <!-- Hero -->
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:2.8rem;margin-bottom:12px">📚</div>
      <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px">اختبر معلوماتك</h1>
      <p style="color:var(--text-muted);font-size:.95rem">اختر المادة التي تريد الاختبار بها</p>
    </div>

    <!-- Subjects list -->
    <div id="subjects-list" style="display:flex;flex-direction:column;gap:12px"></div>

    <!-- Empty state -->
    <div id="empty-state" class="card empty-state" style="display:none">
      <div class="es-icon">📭</div>
      <h3>لا توجد اختبارات متاحة حالياً</h3>
      <p>لم يتم إضافة أي اختبارات بعد.<br>تواصل مع المدرّس لإضافة المواد والاختبارات.</p>
    </div>

  </div>
</main>

<div id="toast-container"></div>
<script src="data.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initTheme('theme-toggle');
  render();
});

function render() {
  const subjects = DB.getPublic();
  const list  = document.getElementById('subjects-list');
  const empty = document.getElementById('empty-state');

  if (subjects.length === 0) {
    list.style.display  = 'none';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  list.style.display  = 'flex';

  const icons = ['📘','📗','📙','📕','📓','📔','📒','📃'];

  list.innerHTML = subjects.map((s, i) => {
    const qCount = s.quizzes.length;
    const qLabel = qCount === 1 ? 'اختبار واحد' : `${qCount} اختبارات`;
    const totalQ = s.quizzes.reduce((acc, q) => acc + (q.questions?.length || 0), 0);
    return `
      <a href="subject.html?sid=${s.id}" class="card subject-card card-flat">
        <div class="s-icon">${icons[i % icons.length]}</div>
        <div class="s-info">
          <div class="s-name">${escHtml(s.name)}</div>
          <div class="s-meta">${qLabel} · ${totalQ} سؤال</div>
        </div>
        <div class="s-arrow">←</div>
      </a>`;
  }).join('');
}
</script>
</body>
</html>
